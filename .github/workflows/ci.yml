name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dev deps
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Black check
        run: black --check .

      - name: Ruff lint
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install deps
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=xml --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install security tools
        run: python -m pip install --upgrade pip && pip install bandit pip-audit

      - name: Bandit scan
        run: bandit -r src -ll

      - name: pip-audit
        run: pip-audit --progress-spinner off || true

      - name: GitLeaks scan
        uses: zricethezav/gitleaks-action@v1
        with:
          args: detect --source=.
