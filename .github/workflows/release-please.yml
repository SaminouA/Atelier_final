name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Validate release-please
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx --yes --quiet release-please@17.1.2 release-pr \
            --dry-run \
            --token="$GITHUB_TOKEN" \
            --repo-url="$GITHUB_REPOSITORY" \
            --target-branch=main \
            --release-type=simple

      - name: Next step
        run: |
          echo "Release Please is configured in dry-run mode."
          echo "Enable Actions pull request creation to let it open release PRs."
