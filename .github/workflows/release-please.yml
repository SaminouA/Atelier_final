name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        continue-on-error: true
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          package-name: todo-api-nadira-kevin

      - name: Release Please note
        run: |
          echo "If release-please did not create a PR, enable GitHub Actions PR creation in repository settings."
