name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      PROJECT_ID: tp9-demo-2026
      REGION: europe-west1
      SERVICE_NAME: todo-api-nadira-kevin
      REPOSITORY: todo-repo-nadira-kevin
      IMAGE_NAME: todo-api
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

    steps:
      - name: Skip deployment when GCP_SA_KEY is missing
        if: env.GCP_SA_KEY == ''
        run: echo "GCP_SA_KEY is not configured; skipping deployment."

      - uses: actions/checkout@v4
        if: env.GCP_SA_KEY != ''

      - id: auth
        if: env.GCP_SA_KEY != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        if: env.GCP_SA_KEY != ''
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: env.GCP_SA_KEY != ''
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build and push image
        if: env.GCP_SA_KEY != ''
        run: |
          IMAGE_SHA="$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:${{ github.sha }}"
          IMAGE_LATEST="$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:latest"
          docker build -t "$IMAGE_SHA" -t "$IMAGE_LATEST" .
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"
          echo "IMAGE=$IMAGE_SHA" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        if: env.GCP_SA_KEY != ''
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image="$IMAGE" \
            --region="$REGION" \
            --platform=managed \
            --allow-unauthenticated \
            --project="$PROJECT_ID"
